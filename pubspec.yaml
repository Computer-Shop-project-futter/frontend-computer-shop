name: computer_shop
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Navigation
  go_router: ^13.0.0

  # Supabase
  supabase_flutter: ^2.5.0
  supabase: ^2.5.0

  # Connectivity
  connectivity_plus: ^5.0.0
  
  # Database
  sqflite: ^2.3.0
  path: ^1.9.0
  
  # Video Player
  video_player: ^2.8.0
  
  # Carousel
  carousel_slider: ^5.1.2
  
  # State management
  flutter_riverpod: ^2.5.0

  # HTTP client
  dio: ^5.4.0

  # Local storage
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0

  # Maps (store locator)
  google_maps_flutter: ^2.6.0

  # Image
  cached_network_image: ^3.3.0
  image_picker: ^1.0.7

  # UI
  shimmer: ^3.0.0
  fl_chart: ^0.67.0

  # Auth
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^6.0.4

  # WebSocket (chat)
  web_socket_channel: ^2.4.0

  # Utils
  intl: ^0.19.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0
  flutter_dotenv: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.6
  json_serializable: ^6.6.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - .env
    - assets/images/
    - assets/videos/